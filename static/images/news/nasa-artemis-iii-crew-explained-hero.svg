<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Calm Moon mission planning illustration</title>
  <desc id="desc">A calm pixel-inspired hero image showing the Moon, stars, and a mission-planning desk silhouette for a science news explainer.</desc>
  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#071225"/>
      <stop offset="0.55" stop-color="#0b1d3a"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f7f3df"/>
      <stop offset="0.68" stop-color="#d9d2bc"/>
      <stop offset="1" stop-color="#8d8a7f"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#space)"/>

  <!-- pixel stars -->
  <g fill="#d8e7ff" opacity="0.9">
    <rect x="92" y="88" width="6" height="6"/>
    <rect x="176" y="191" width="4" height="4"/>
    <rect x="289" y="106" width="5" height="5"/>
    <rect x="430" y="74" width="4" height="4"/>
    <rect x="733" y="91" width="6" height="6"/>
    <rect x="863" y="169" width="4" height="4"/>
    <rect x="1014" y="104" width="5" height="5"/>
    <rect x="1091" y="224" width="4" height="4"/>
    <rect x="650" y="219" width="4" height="4"/>
    <rect x="520" y="183" width="5" height="5"/>
  </g>

  <!-- moon -->
  <circle cx="880" cy="250" r="145" fill="#d9d2bc" opacity="0.18" filter="url(#softGlow)"/>
  <circle cx="880" cy="250" r="112" fill="url(#moonGlow)"/>
  <g fill="#b8b19f" opacity="0.55">
    <circle cx="837" cy="217" r="15"/>
    <circle cx="910" cy="195" r="10"/>
    <circle cx="927" cy="288" r="20"/>
    <circle cx="856" cy="306" r="12"/>
    <circle cx="882" cy="244" r="7"/>
  </g>

  <!-- subtle orbit path -->
  <path d="M226 422 C414 220, 732 202, 1012 364" fill="none" stroke="#67e8f9" stroke-width="3" opacity="0.25" stroke-dasharray="10 18"/>
  <rect x="502" y="280" width="18" height="18" fill="#f8fafc" opacity="0.9" transform="rotate(18 511 289)"/>
  <rect x="488" y="294" width="46" height="4" fill="#93c5fd" opacity="0.8" transform="rotate(18 511 296)"/>

  <!-- mission planning desk silhouette -->
  <g transform="translate(155 420)">
    <rect x="0" y="70" width="535" height="42" fill="#111827"/>
    <rect x="38" y="112" width="34" height="105" fill="#0b1020"/>
    <rect x="456" y="112" width="34" height="105" fill="#0b1020"/>
    <rect x="80" y="0" width="250" height="145" rx="8" fill="#172033" stroke="#334155" stroke-width="4"/>
    <rect x="101" y="23" width="208" height="84" fill="#0f2a44"/>
    <path d="M116 84 L159 57 L198 73 L235 39 L294 89" fill="none" stroke="#67e8f9" stroke-width="5" stroke-linecap="square" stroke-linejoin="round"/>
    <rect x="115" y="119" width="36" height="8" fill="#64748b"/>
    <rect x="166" y="119" width="86" height="8" fill="#475569"/>
    <rect x="365" y="34" width="74" height="94" rx="5" fill="#1e293b" stroke="#475569" stroke-width="4"/>
    <rect x="380" y="51" width="44" height="8" fill="#94a3b8"/>
    <rect x="380" y="73" width="36" height="8" fill="#64748b"/>
    <rect x="380" y="95" width="50" height="8" fill="#64748b"/>
  </g>

  <!-- Dadbot label without article text -->
  <g opacity="0.55">
    <rect x="64" y="52" width="18" height="18" fill="#67e8f9"/>
    <rect x="88" y="52" width="18" height="18" fill="#38bdf8"/>
    <rect x="112" y="52" width="18" height="18" fill="#1d4ed8"/>
  </g>
</svg>
