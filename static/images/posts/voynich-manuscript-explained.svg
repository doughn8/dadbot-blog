<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Voynich Manuscript Conspiracy Corner cover</title>
  <desc id="desc">Terminal-style purple Conspiracy Corner cover art for the Voynich Manuscript, with mysterious manuscript symbols and a 1404 to 1438 date motif.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08030d"/>
      <stop offset="0.55" stop-color="#1a0b29"/>
      <stop offset="1" stop-color="#0b0412"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0v24" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#grid)"/>
  <rect x="20" y="20" width="1160" height="380" fill="none" stroke="#d946ef" stroke-width="3"/>

  <g fill="none" stroke="#f4d7ff" stroke-opacity="0.8" stroke-width="3">
    <path d="M58 88V48h100"/><path d="M1042 48h100v40"/>
    <path d="M58 332v40h100"/><path d="M1142 332v40h-100"/>
  </g>

  <g font-family="Menlo, Monaco, Consolas, monospace" font-size="22" fill="#b78ac9" opacity="0.7">
    <text x="96" y="92">┌─ MANUSCRIPT SCAN // UNKNOWN SCRIPT ───────────────────────────────┐</text>
    <text x="96" y="134" fill="#89ffb6">qo kedy qokedy dal qokar shedy qokain</text>
    <text x="96" y="164" fill="#89ffb6">otol daiin qotedy okar olchedy yteedy</text>
    <text x="96" y="214">plant?     code?      hoax?       lost system?</text>
    <text x="96" y="244">  ╱╲       0101       ????           ////</text>
    <text x="96" y="274"> ╱░░╲      1010       UNREAD         ░░░░</text>
    <text x="96" y="304">╱░░░░╲     0110       STILL          ░░░░</text>
  </g>

  <g font-family="Menlo, Monaco, Consolas, monospace" text-anchor="middle">
    <text x="760" y="174" fill="#f4d7ff" opacity="0.5" font-size="30">✶ ───────▶ ✶</text>
    <text x="760" y="216" fill="#c08bd8" font-size="28">1404–1438</text>
  </g>

  <g filter="url(#glow)">
    <rect x="250" y="228" width="700" height="130" fill="#09040f" fill-opacity="0.9" stroke="#fb7185" stroke-width="2"/>
    <text x="286" y="270" font-family="Menlo, Monaco, Consolas, monospace" font-size="18" fill="#89ffb6" letter-spacing="5">DADBOT CHAOS MONITOR</text>
    <text x="286" y="326" font-family="Menlo, Monaco, Consolas, monospace" font-size="58" font-weight="900" fill="#fff3ff">VOYNICH MANUSCRIPT</text>
  </g>

  <g font-family="Menlo, Monaco, Consolas, monospace" font-size="19" fill="#ffd166">
    <rect x="966" y="244" width="154" height="34" fill="none" stroke="#d946ef"/>
    <text x="980" y="267">UNDECODED</text>
    <rect x="966" y="292" width="154" height="34" fill="none" stroke="#d946ef"/>
    <text x="980" y="315">NO SOLVED</text>
  </g>
</svg>
