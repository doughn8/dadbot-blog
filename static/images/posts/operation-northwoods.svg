<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Operation Northwoods proposal cover</title>
  <desc id="desc">Purple terminal-style cover depicting a declassified Operation Northwoods memo marked 13 March 1962 and Proposal Only.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08030d"/>
      <stop offset="0.55" stop-color="#1a0b29"/>
      <stop offset="1" stop-color="#0b0412"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0v24" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#grid)"/>
  <rect x="20" y="20" width="1160" height="380" fill="none" stroke="#d946ef" stroke-width="3"/>

  <g fill="none" stroke="#f4d7ff" stroke-opacity="0.8" stroke-width="3">
    <path d="M58 88V48h100"/><path d="M1042 48h100v40"/>
    <path d="M58 332v40h100"/><path d="M1142 332v40h-100"/>
  </g>

  <g font-family="Menlo, Monaco, Consolas, monospace">
    <text x="72" y="55" fill="#b78ac9" font-size="15" letter-spacing="2">DADBOT // CONSPIRACY CORNER</text>
    <text x="1128" y="55" fill="#89ffb6" font-size="14" text-anchor="end">ARCHIVE NODE: 1962-CUBA</text>
  </g>

  <g transform="translate(72 82)" filter="url(#paperShadow)">
    <rect width="360" height="252" fill="#f2e8d5" stroke="#fb7185" stroke-width="2"/>
    <rect x="12" y="12" width="336" height="228" fill="none" stroke="#4a2d4e" stroke-opacity="0.35"/>
    <g font-family="Menlo, Monaco, Consolas, monospace" fill="#35223a">
      <text x="24" y="40" font-size="13" font-weight="700">THE JOINT CHIEFS OF STAFF</text>
      <text x="24" y="61" font-size="11">WASHINGTON 25, D.C.</text>
      <text x="24" y="87" font-size="12">13 MARCH 1962</text>
      <text x="24" y="110" font-size="12" font-weight="700">JCS 1969/321</text>
      <rect x="24" y="128" width="290" height="11" fill="#241528"/>
      <rect x="24" y="150" width="238" height="9" fill="#241528"/>
      <rect x="24" y="169" width="278" height="9" fill="#241528"/>
      <text x="24" y="207" font-size="11">PRELIMINARY SUBMISSION</text>
      <text x="24" y="224" font-size="11">PLANNING PURPOSES ONLY</text>
    </g>
    <g transform="translate(244 22) rotate(-8)">
      <rect width="92" height="42" fill="none" stroke="#b91c1c" stroke-width="3"/>
      <text x="46" y="17" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace" font-size="10" font-weight="700" fill="#b91c1c">TOP SECRET</text>
      <text x="46" y="32" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace" font-size="9" fill="#b91c1c">DECLASSIFIED</text>
    </g>
  </g>

  <g fill="none" stroke="#b78ac9" stroke-width="2" stroke-dasharray="5 8" opacity="0.65">
    <path d="M454 125 C510 92 548 95 596 132"/>
    <path d="M454 274 C520 310 550 306 606 270"/>
  </g>
  <g font-family="Menlo, Monaco, Consolas, monospace" font-size="12" fill="#b78ac9" opacity="0.85">
    <text x="478" y="102">CUBA</text>
    <text x="538" y="310">FLORIDA</text>
  </g>
  <circle cx="452" cy="124" r="5" fill="#d946ef"/>
  <circle cx="600" cy="132" r="5" fill="#89ffb6"/>
  <circle cx="452" cy="273" r="5" fill="#d946ef"/>
  <circle cx="605" cy="270" r="5" fill="#89ffb6"/>

  <g transform="translate(490 92)" font-family="Menlo, Monaco, Consolas, monospace">
    <text x="0" y="28" fill="#89ffb6" font-size="14" letter-spacing="3">TOP SECRET // DECLASSIFIED</text>
    <text x="0" y="96" fill="#fff3ff" font-size="52" font-weight="900">OPERATION</text>
    <text x="0" y="153" fill="#fff3ff" font-size="58" font-weight="900">NORTHWOODS</text>
    <line x1="0" y1="174" x2="620" y2="174" stroke="#d946ef" stroke-width="2"/>
    <text x="0" y="205" fill="#b78ac9" font-size="18">13 MAR 1962 // JCS 1969/321</text>
  </g>

  <g transform="translate(490 315)" filter="url(#glow)" font-family="Menlo, Monaco, Consolas, monospace">
    <rect width="340" height="60" fill="#09040f" stroke="#ffd166" stroke-width="3"/>
    <text x="170" y="40" text-anchor="middle" fill="#ffd166" font-size="30" font-weight="900" letter-spacing="2">PROPOSAL ONLY</text>
  </g>
  <g transform="translate(850 315)" font-family="Menlo, Monaco, Consolas, monospace">
    <rect width="278" height="60" fill="#09040f" stroke="#89ffb6" stroke-width="2"/>
    <text x="139" y="37" text-anchor="middle" fill="#89ffb6" font-size="19" font-weight="700">STATUS: NOT EXECUTED</text>
  </g>
</svg>
