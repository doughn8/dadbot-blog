<!-- Buy Me a Coffee Button - Terminal Portrait Style -->
<a href="https://buymeacoffee.com/dadbot"
   class="coffee-button"
   target="_blank"
   rel="noopener noreferrer"
   aria-label="Buy me a coffee"
   title="Buy me a coffee">
  <span class="coffee-text coffee-text--top">Buy me</span>
  <span class="coffee-cup" aria-hidden="true">
    <svg class="coffee-cup-svg" viewBox="0 0 96 78" role="img" focusable="false">
      <path class="coffee-steam-line" d="M36 3c6 5 6 10 0 15" />
      <path class="coffee-steam-line" d="M52 1c-6 6-6 11 0 17" />
      <path class="coffee-steam-line" d="M67 6c6 5 6 10 0 15" />
      <path class="coffee-cup-top" d="M24 29h56" />
      <path class="coffee-cup-rim" d="M20 34h64" />
      <path class="coffee-cup-body" d="M24 34h56v30H24z" />
      <path class="coffee-cup-handle" d="M24 42c-14 0-14 15 0 15" />
      <path class="coffee-cup-pattern" d="M33 42l5 12 5-12 5 12 5-12 5 12 5-12 5 12" />
      <path class="coffee-cup-saucer" d="M27 70h50" />
      <path class="coffee-cup-saucer-dash" d="M34 75h36" />
    </svg>
  </span>
  <span class="coffee-text coffee-text--bottom">a coffee</span>
</a>

<script>
(function () {
  const target = document.getElementById('typed-tagline');
  if (!target) return;

  const lines = [
    'no topics off limits',
    'hot takes, cold coffee',
    'parenting, money, tech, books',
    'asking dumb questions seriously',
    'loading dad wisdom...'
  ];

  let lineIndex = 0;
  let charIndex = 0;
  let deleting = false;

  function tick() {
    const line = lines[lineIndex];
    target.textContent = line.slice(0, charIndex);

    if (!deleting && charIndex < line.length) {
      charIndex += 1;
      setTimeout(tick, 65);
      return;
    }

    if (!deleting && charIndex === line.length) {
      deleting = true;
      setTimeout(tick, 1450);
      return;
    }

    if (deleting && charIndex > 0) {
      charIndex -= 1;
      setTimeout(tick, 35);
      return;
    }

    deleting = false;
    lineIndex = (lineIndex + 1) % lines.length;
    setTimeout(tick, 250);
  }

  tick();
})();
</script>
