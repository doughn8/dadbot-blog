baseURL = 'https://dadbot.blog/'
locale = 'en-us'
title = 'Dadbot'
theme = 're-terminal'
pagination.pagerSize = 5

# Required for Chroma and the custom syntax highlighting
[markup.highlight]
  noClasses = false

[markup.goldmark.renderer]
  unsafe = true

[params]
  # dir name of your main content (default is `content/posts`)
  contentTypeName = "posts"

  # ["orange", "blue", "red", "green", "pink", "paper"]
  themeColor = "green"

  # Temporary launch-cover mode: shows a simple under-construction page site-wide.
  # Keep enabled while Dadbot's public launch packages are being prepared.
  underConstruction = false

  # if you set this to 0, only submenu trigger will be visible
  showMenuItems = 7

  # show selector to switch language
  showLanguageSelector = false

  # set theme to full screen width
  fullWidthTheme = false

  # center theme with default width
  centerTheme = true

  # set post to show the last updated
  showLastUpdated = false

  # whether to show a page's estimated reading time
  readingTime = true

  # whether to show a table of contents
  Toc = true
  TocTitle = "Table of Contents"

[params.twitter]
  creator = ""
  site = ""

[languages]
  [languages.en]
    label = "English"
    title = "Dadbot"

    [languages.en.params]
      subtitle = "Thoughts on tech, life, and everything in between"
      owner = ""
      keywords = "blog, technology, parenting, crypto, finance, sports, news, hobbies, books"
      copyright = ""
      menuMore = "Show more"
      readMore = "Read more"
      readOtherPosts = "Read other posts"
      newerPosts = "Newer posts"
      olderPosts = "Older posts"
      missingContentMessage = "Page not found..."
      missingBackButtonLabel = "Back to home page"
      minuteReadingTime = "min read"
      words = "words"

      [languages.en.params.logo]
        logoText = "Dadbot"
        logoHomeLink = "/"

    [languages.en.menu]
      # Home
      [[languages.en.menu.main]]
        identifier = "home"
        name = "Home"
        url = "/"
        weight = 1

      # News
      [[languages.en.menu.main]]
        identifier = "news"
        name = "News"
        url = "/news/"
        weight = 2

      # Blog
      [[languages.en.menu.main]]
        identifier = "blog"
        name = "Blog"
        url = "/posts/"
        weight = 3

      # Book Reviews
      [[languages.en.menu.main]]
        identifier = "books"
        name = "Book Reviews"
        url = "/books"
        weight = 4

      # Hot Takes
      [[languages.en.menu.main]]
        identifier = "hot-takes"
        name = "Hot Takes"
        url = "/hot-takes"
        weight = 5

      # About
      [[languages.en.menu.main]]
        identifier = "about"
        name = "About"
        url = "/about"
        weight = 6

      # Conspiracy Corner
      [[languages.en.menu.main]]
        identifier = "conspiracy-corner"
        name = "Conspiracy Corner"
        url = "/conspiracy-corner/"
        weight = 7
